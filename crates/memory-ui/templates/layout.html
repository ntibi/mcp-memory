<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        (function() {
            var s = localStorage.getItem('theme');
            var t = s || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <title>Memory</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <strong class="logo">Memory</strong>
            </div>
            <div class="search-wrapper">
                <input type="search"
                       class="search-bar"
                       name="q"
                       placeholder="Search memories..."
                       hx-get="/ui/memories"
                       hx-trigger="input delay:300ms, search"
                       hx-target="#card-grid"
                       hx-push-url="true"
                       hx-indicator="#search-indicator">
                <span id="search-indicator" class="htmx-indicator" aria-busy="true"></span>
                <select class="sort-select" onchange="changeSort(this.value)">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="most_used">Most used</option>
                    <option value="least_used">Least used</option>
                    <option value="most_useful">Most useful</option>
                    <option value="most_harmful">Most harmful</option>
                </select>
                <a href="/ui/curation" class="nav-link curation-link" aria-label="Curation">
                    Curation
                    <span hx-get="/ui/curation/indicator" hx-trigger="load, every 10s" hx-swap="innerHTML"></span>
                </a>
                {% if is_admin %}
                <a href="/ui/admin" class="admin-btn" aria-label="Admin">Admin</a>
                {% endif %}
                <button class="logout-btn" onclick="logout()" aria-label="Logout">Logout</button>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                    <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>
    <main class="layout">
        <aside class="sidebar"
               hx-get="/ui/tags"
               hx-trigger="load, memoryChanged from:body"
               hx-swap="innerHTML">
        </aside>
        <section id="card-grid"
                 hx-get="/ui/memories"
                 hx-trigger="load"
                 hx-swap="innerHTML">
        </section>
        <div id="load-more"></div>
    </main>
    <script>
        var currentTags = (new URLSearchParams(window.location.search).get('tag') || '')
            .split(',').filter(function(t) { return t.length > 0; });
        var currentSort = new URLSearchParams(window.location.search).get('sort') || 'newest';

        function tagParam() {
            return currentTags.join(',');
        }

        function buildParams() {
            var params = [];
            if (currentQuery) params.push('q=' + encodeURIComponent(currentQuery));
            if (currentTags.length) params.push('tag=' + encodeURIComponent(tagParam()));
            if (currentSort && currentSort !== 'newest') params.push('sort=' + encodeURIComponent(currentSort));
            return params.length ? '?' + params.join('&') : '';
        }

        function feedUrl() {
            return '/ui/memories' + buildParams();
        }

        function pushUrl() {
            return '/ui' + buildParams();
        }

        var currentQuery = new URLSearchParams(window.location.search).get('q') || '';

        (function() {
            var grid = document.getElementById('card-grid');
            if (grid) {
                var url = feedUrl();
                if (url !== '/ui/memories') grid.setAttribute('hx-get', url);
            }
            if (currentQuery) {
                var input = document.querySelector('.search-bar');
                if (input) input.value = currentQuery;
            }
            var sortSelect = document.querySelector('.sort-select');
            if (sortSelect) sortSelect.value = currentSort;
        })();

        document.body.addEventListener('htmx:configRequest', function(e) {
            var key = localStorage.getItem('api_key');
            if (key) {
                e.detail.headers['Authorization'] = 'Bearer ' + key;
            }
            if (e.detail.elt.classList.contains('sidebar')) {
                e.detail.parameters.tag = tagParam();
            }
            if (e.detail.elt.classList.contains('search-bar')) {
                if (currentSort && currentSort !== 'newest') {
                    e.detail.parameters.sort = currentSort;
                }
                if (currentTags.length) {
                    e.detail.parameters.tag = tagParam();
                }
            }
        });

        document.body.addEventListener('htmx:responseError', function(e) {
            if (e.detail.xhr.status === 401) {
                localStorage.removeItem('api_key');
                document.cookie = 'api_key=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
                window.location.href = '/ui/login';
            }
        });

        function logout() {
            localStorage.removeItem('api_key');
            document.cookie = 'api_key=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            window.location.href = '/ui/login';
        }

        function toggleTheme() {
            var cur = document.documentElement.getAttribute('data-theme');
            var next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        function refreshFeed() {
            htmx.ajax('GET', feedUrl(), {target: '#card-grid', swap: 'innerHTML'});
            history.pushState({}, '', pushUrl() || '/ui');
        }

        function changeSort(value) {
            currentSort = value;
            refreshFeed();
        }

        function clearTags(el) {
            currentTags = [];
            document.querySelectorAll('.sidebar li a').forEach(function(a) {
                a.classList.remove('active');
            });
            el.classList.add('active');
        }

        function toggleTag(event, el) {
            event.preventDefault();
            var tag = el.getAttribute('data-tag');
            var idx = currentTags.indexOf(tag);
            if (idx >= 0) {
                currentTags = [];
            } else {
                currentTags = [tag];
            }
            refreshFeed();
            htmx.ajax('GET', '/ui/tags?tag=' + encodeURIComponent(tagParam()), {target: '.sidebar', swap: 'innerHTML'});
        }

        document.body.addEventListener('click', function(e) {
            var cardTag = e.target.closest('.tags a.tag');
            if (cardTag) {
                var tag = cardTag.textContent.trim();
                if (currentTags.indexOf(tag) < 0) {
                    currentTags = [tag];
                }
                htmx.ajax('GET', '/ui/tags?tag=' + encodeURIComponent(tagParam()), {target: '.sidebar', swap: 'innerHTML'});
                refreshFeed();
            }
        });

        matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });

        document.addEventListener('htmx:afterSettle', function(e) {
            if (e.detail.target && e.detail.target.classList &&
                e.detail.target.classList.contains('vote-section')) {
                e.detail.target.classList.add('vote-flash');
                setTimeout(function() {
                    e.detail.target.classList.remove('vote-flash');
                }, 300);
            }
        });
    </script>
</body>
</html>
