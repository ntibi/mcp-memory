<button hx-post="/ui/memories/{{ card.id }}/vote?vote=helpful"
        hx-target="#votes-{{ card.id }}"
        hx-swap="innerHTML">&#9650;</button>
<span class="count">{{ card.helpful }}</span>

        hx-target="#votes-{{ card.id }}"

<span class="count">{{ card.harmful }}</span>
