<ul>
    <li><a href="#"
           hx-get="/ui/memories"
           hx-target="#card-grid"
           hx-push-url="/ui"
           onclick="clearTags(this)"
           {% if active_tags.is_empty() %}class="active"{% endif %}>
        <span class="tag-name">All</span> <span class="tag-count">{{ total_count }}</span>
    </a></li>
    {% for tag in tags %}
    <li><a href="#"
           data-tag="{{ tag.0 }}"
           hx-target="#card-grid"
           onclick="toggleTag(event, this)"
           {% if active_tags.contains(&tag.0) %}class="active"{% endif %}>
        <span class="tag-name">{{ tag.0 }}</span> <span class="tag-count">{{ tag.1 }}</span>
    </a></li>
    {% endfor %}
</ul>
