# memory-server configuration

# Address to listen on
listen_addr = "127.0.0.1:8000"

# Path to SQLite database file
db_path = "memory.db"

# Name for the bootstrap admin user (created on first startup)
bootstrap_user = "admin"

[embedding]
# Embedding provider: "local" or "remote"
provider = "local"
# Model name for embeddings
model = "all-MiniLM-L6-v2"
# API key for remote embedding provider (optional)
# api_key = ""
# API URL for remote embedding provider (optional)
# api_url = ""

[scoring]
# Weights for memory scoring (should sum to 1.0)
relevance_weight = 0.6
confidence_weight = 0.25
recency_weight = 0.15
# Half-life in days for recency exponential decay
recency_half_life_days = 30.0

[curation]
# Interval in seconds between curation runs
interval_secs = 3600
# Similarity threshold for duplicate detection
similarity_threshold = 0.85

# LLM provider/key/model are configured per-user via the curation settings UI
# Supported providers: anthropic, openai, gemini
